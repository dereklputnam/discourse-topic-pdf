enabled_categories:
  type: list
  list_type: category
  default: ""
  description:
    en: "Categories where the PDF button appears. Leave empty to hide everywhere."

enabled_tags:
  type: list
  list_type: tag
  default: ""
  description:
    en: "Tags where the PDF button appears. Leave empty to hide everywhere."

enabled_topic_ids:
  type: list
  default: ""
  description:
    en: "Specific topic IDs where the PDF button always appears (comma or pipe separated)."

first_post_only:
  type: bool
  default: true
  description:
    en: "When enabled, only the first post (original post) is included in the PDF. Disable to include all replies."

show_post_meta:
  type: bool
  default: true
  description:
    en: "Show author username and date above each post in the PDF."

button_location:
  type: enum
  default: "post-before-cooked"
  choices:
    - "post-before-cooked"
    - "topic-above-posts"
    - "topic-above-post-stream"
    - "topic-footer-buttons"
    - "above-topic-footer-buttons"
  description:
    en: "Plugin outlet where the PDF button is rendered. post-before-cooked places it inside the first post, above the content."

button_style:
  type: enum
  default: "secondary"
  choices:
    - "secondary"
    - "primary"
  description:
    en: "Secondary matches the outline style of buttons like Assign. Primary uses the filled color style like Reply to Topic."
