enabled_categories:
  type: list
  list_type: category
  default: ""
  description:
    en: "Categories where the PDF button appears. Leave empty to hide everywhere."

enabled_tags:
  type: list
  list_type: tag
  default: ""
  description:
    en: "Tags where the PDF button appears. Leave empty to hide everywhere."

enabled_topic_ids:
  type: list
  default: ""
  description:
    en: "Specific topic IDs where the PDF button always appears (comma or pipe separated)."

first_post_only:
  type: bool
  default: true
  description:
    en: "When enabled, only the first post (original post) is included in the PDF. Disable to include all replies."

show_post_meta:
  type: bool
  default: true
  description:
    en: "Show author username and date above each post in the PDF."

show_logo:
  type: bool
  default: true
  description:
    en: "Show the site logo at the top of the PDF."

show_tags:
  type: bool
  default: true
  description:
    en: "Show topic tags in the PDF header."

show_toc:
  type: bool
  default: true
  description:
    en: "Auto-generate a table of contents from headings in the post content."


button_style:
  type: enum
  default: "secondary"
  choices:
    - "secondary"
    - "primary"
  description:
    en: "Secondary matches the outline style of buttons like Assign. Primary uses the filled color style like Reply to Topic."
