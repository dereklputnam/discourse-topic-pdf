pdf_rules:
  type: objects
  default: []
  description:
    en: "Rules that control where the PDF button appears. Add one or more rows; the button shows if any row matches the current topic. The button is hidden everywhere until at least one rule is saved."
  schema:
    name: PDF Rule
    properties:
      selected_categories:
        type: categories
      selected_tags:
        type: tags
      selected_topic_ids:
        type: string

first_post_only:
  type: bool
  default: true
  description:
    en: "When enabled, only the first post (original post) is included in the PDF. Disable to include all replies."

show_post_meta:
  type: bool
  default: true
  description:
    en: "Show author username and date above each post in the PDF."

button_location:
  type: enum
  default: "topic-above-posts"
  choices:
    - "topic-above-posts"
    - "topic-above-post-stream"
    - "topic-footer-buttons"
    - "above-topic-footer-buttons"
  description:
    en: "Plugin outlet where the PDF button is rendered."

button_style:
  type: enum
  default: "secondary"
  choices:
    - "secondary"
    - "primary"
  description:
    en: "Secondary matches the outline style of buttons like Assign. Primary uses the filled color style like Reply to Topic."
